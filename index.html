<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DBA Lit Review — Slide Preview</title></head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
// Inline the JSX here for standalone viewing
const { useState } = React;

// ─── BRAND TOKENS (DBA Thesis template) ───
const C = {
  navy:"#003366", blue:"#4A7FB5", red:"#B22028", txt:"#767171", wh:"#FFFFFF",
  pg:"#BCBCBC", bg:"#F5F5F5", lbg:"#FAFAFA", neu:"#D9D9D9", dk:"#3F3F3F",
  mgr:"#8C8C8C", green:"#2D7D4F", yellow:"#FFC000", purple:"#7030A0",
  tagBg:"#E8E8E8", quoteBg:"#F5F5F5", phBg:"#F0F4F8",
};
const F = {t:"'Century Gothic','Gill Sans','Trebuchet MS',sans-serif", b:"Calibri,'Trebuchet MS',sans-serif"};

const Frame = ({children,title,num,source}) => (
  <div style={{width:960,height:540,position:"relative",background:C.wh,fontFamily:F.b,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,0.12)"}}>
    <div style={{position:"absolute",left:3,top:22,width:5,height:52,background:C.neu}}/>
    <div style={{padding:"22px 50px 0 62px"}}>
      <div style={{fontFamily:F.t,fontSize:17,color:C.txt,lineHeight:1.25}}>{title}</div>
    </div>
    <div style={{padding:"0 50px 0 62px"}}>{children}</div>
    <div style={{position:"absolute",bottom:44,left:36,right:36,height:1,background:C.neu}}/>
    <div style={{position:"absolute",bottom:16,left:36,fontSize:7.5,fontWeight:700,color:C.red,letterSpacing:1.5}}>CONFIDENTIAL</div>
    <div style={{position:"absolute",bottom:16,right:40,fontSize:8,color:C.pg}}>{num}</div>
    {source && <div style={{position:"absolute",bottom:50,left:36,right:50,fontSize:7,color:C.pg,fontStyle:"italic"}}>{source}</div>}
  </div>
);

const Tags = ({bucket, bucketColor, method}) => (
  <div style={{display:"flex",gap:6,margin:"8px 0 10px"}}>
    <span style={{padding:"3px 10px",borderRadius:3,fontSize:7.5,fontWeight:700,color:C.wh,background:bucketColor,letterSpacing:0.3}}>{bucket}</span>
    <span style={{padding:"3px 10px",borderRadius:3,fontSize:7.5,fontWeight:700,color:C.dk,background:C.tagBg,letterSpacing:0.3}}>{method}</span>
  </div>
);

const SH = ({children, color}) => (
  <div style={{fontFamily:F.t,fontSize:10,fontWeight:700,color:color||C.navy,marginBottom:4,marginTop:8}}>{children}</div>
);

const Quote = ({text, color}) => (
  <div style={{background:C.quoteBg,borderLeft:`3px solid ${color||C.navy}`,padding:"6px 10px",margin:"6px 0"}}>
    <p style={{fontSize:9.5,color:C.mgr,fontStyle:"italic",lineHeight:1.4,margin:0}}>{text}</p>
  </div>
);

const Gap = ({text, color}) => (
  <div style={{display:"flex",alignItems:"flex-start",gap:7,margin:"6px 0",borderLeft:`3px solid ${color||C.navy}`,paddingLeft:8}}>
    <div style={{width:9,height:9,transform:"rotate(45deg)",background:color||C.navy,flexShrink:0,marginTop:3}}/>
    <div style={{fontSize:9,lineHeight:1.4,color:C.txt}}>
      <span style={{fontFamily:F.t,fontWeight:700,color:color||C.navy}}>Research gap</span>{"  "}
      {text}
    </div>
  </div>
);

const Placeholder = ({text, style:s}) => (
  <div style={{background:C.phBg,border:`1px dashed ${C.pg}`,display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",fontSize:10,color:C.mgr,fontStyle:"italic",lineHeight:1.4,padding:12,...s}}>
    {text}
  </div>
);

const Bullets = ({items, size=10.5}) => (
  <div style={{margin:"4px 0"}}>
    {items.map((item,i) => (
      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:3}}>
        <span style={{color:C.txt,fontSize:size,lineHeight:1.4,flexShrink:0}}>•</span>
        <span style={{fontSize:size,color:C.txt,lineHeight:1.4}}>{item}</span>
      </div>
    ))}
  </div>
);

// ─── S2: RBV ───
const S2_RBV = () => (
  <Frame title="Three knowledge-based capabilities underpin the CI function — and connect to the resource-based view" num={2}
    source="Source: Verona & Ravasi, 2003; Ghoshal & Westney, 1991; Chen et al., 2021; Strategic intent contribution: Caricio Carlucci">
    <Tags bucket="RESOURCE-BASED VIEW" bucketColor={C.navy} method="VERONA & RAVASI (2003) + RBV ENRICHMENT"/>
    <div style={{background:C.navy,padding:"8px 14px",display:"inline-block",marginBottom:6}}>
      <span style={{fontFamily:F.t,fontSize:11,fontWeight:700,color:C.wh,letterSpacing:0.5}}>STRATEGIC INTENT</span>
    </div>
    <p style={{fontSize:9,color:C.txt,lineHeight:1.45,margin:"0 0 10px"}}>
      Dynamic capabilities require direction. Strategic intent — the organization's goals, competitive aspirations, and working assumptions — defines what knowledge to seek, how to interpret it, and when to act.
    </p>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {[
        {n:"1",cap:"Knowledge Creation & Absorption",capDesc:"How external knowledge is generated, acquired, and brought into the organization",rbv:"Resource Picking",rbvAuth:"Barney, 1991; Makadok, 2001",rbvDesc:"Identifying which external intelligence to acquire. AI expands the scanning aperture — more sources, broader geographies, continuous monitoring."},
        {n:"2",cap:"Knowledge Integration",capDesc:"How dispersed knowledge gets combined into coherent, actionable intelligence",rbv:"Resource Bundling",rbvAuth:"Sirmon et al., 2007",rbvDesc:"Combining dispersed knowledge into actionable intelligence. Ghoshal's three clusters (data management, analysis, implication) operationalize this."},
        {n:"3",cap:"Knowledge Reconfiguration",capDesc:"How the organization adapts its CI practices and strategic responses over time",rbv:"Capability Building",rbvAuth:"Teece et al., 1997",rbvDesc:"Adapting CI practices = building dynamic capabilities. Firms with superior knowledge resources achieve sustainable competitive advantage."},
      ].map((row,i) => (
        <div key={i} style={{display:"flex",gap:0,alignItems:"stretch"}}>
          <div style={{flex:1,background:C.phBg,borderLeft:`3px solid ${C.navy}`,padding:"7px 10px"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.wh,flexShrink:0}}>{row.n}</div>
              <span style={{fontFamily:F.t,fontSize:9.5,fontWeight:700,color:C.navy}}>{row.cap}</span>
            </div>
            <span style={{fontSize:8,color:C.txt}}>{row.capDesc}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",padding:"0 8px",color:C.pg,fontSize:16}}>→</div>
          <div style={{flex:1,background:C.lbg,borderLeft:`3px solid ${C.blue}`,padding:"7px 10px"}}>
            <div style={{fontFamily:F.t,fontSize:9.5,fontWeight:700,color:C.blue,marginBottom:2}}>{row.rbv} <span style={{fontSize:7,fontWeight:400,color:C.pg}}>({row.rbvAuth})</span></div>
            <span style={{fontSize:8,color:C.txt}}>{row.rbvDesc}</span>
          </div>
        </div>
      ))}
    </div>
    <p style={{fontSize:8,color:C.mgr,textAlign:"center",marginTop:8,fontStyle:"italic",lineHeight:1.4}}>
      These capabilities operate as continuous knowledge dynamics. RBV explains why firms with superior knowledge resources achieve advantage — but not how they deploy those resources competitively (→ CD)
    </p>
  </Frame>
);

// ─── S8: CD ───
const S8_CD = () => (
  <Frame title="Competitive dynamics explains how firms act and react in the marketplace — AMC drives the behavioral side" num={8}
    source="Source: Chen, 1996; Gur & Greckhamer, 2019; Tsai et al., 2011; Chen et al., 2021">
    <Tags bucket="COMPETITIVE DYNAMICS" bucketColor={C.navy} method="LITERATURE SYNTHESIS"/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1.05}}>
        <SH color={C.navy}>CD FOUNDATIONS</SH>
        <Bullets size={9.5} items={[
          "CD is outward-focused: studying a firm's moves and countermoves in the marketplace (Chen & Miller, 2012)",
          "AMC framework (Chen, 1996): Awareness, Motivation, and Capability determine whether firms act on competitive signals",
          "Market commonality + resource similarity = prebattle competitive tension; competitive asymmetry means rivals don't pose equal threats",
        ]}/>
        <SH color={C.navy}>KEY CONSTRUCTS</SH>
        {[
          {title:"Competitor Identification",desc:"Firms develop routines to identify competitors — four perspectives. AI changes these routines fundamentally.",src:"Gur & Greckhamer, 2019",color:C.navy},
          {title:"Competitor Acumen",desc:"How accurately a firm comprehends a rival's prioritization of its competitors. Predicts market share gains.",src:"Tsai, Su & Chen, 2011",color:C.navy},
          {title:"Time-Based Competition",desc:"Neither CD nor RBV addresses how firms build resources for future markets. CI's forward-looking element bridges this gap.",src:"Chen, Michel & Lin, 2021",color:C.red},
        ].map((c,i) => (
          <div key={i} style={{background:C.lbg,borderLeft:`3px solid ${c.color}`,padding:"6px 10px",marginBottom:5}}>
            <div style={{fontFamily:F.t,fontSize:9.5,fontWeight:700,color:c.color,marginBottom:1}}>{c.title}</div>
            <div style={{fontSize:8.5,color:C.txt,lineHeight:1.35}}>{c.desc}</div>
            <div style={{fontSize:7,color:C.pg,fontStyle:"italic",marginTop:2}}>{c.src}</div>
          </div>
        ))}
      </div>
      <div style={{flex:0.95}}>
        <SH color={C.navy}>FROM CD TO CI: THE BEHAVIORAL BRIDGE</SH>
        {[
          {label:"AWARENESS",bg:C.navy,desc:"What the CI system surfaces — expanded competitive landscape through AI scanning. Does the firm recognize the competitive relationship?"},
          {label:"MOTIVATION",bg:C.blue,desc:"Strategic context that determines relevance — why intelligence matters for this firm now. Is there sufficient incentive to act?"},
          {label:"CAPABILITY",bg:"#4A6E8C",desc:"Organizational resources to act — does the firm have the capacity to respond? This is the natural bridge to RBV."},
        ].map((a,i) => (
          <div key={i}>
            <div style={{background:a.bg,padding:"5px 10px",marginTop:i>0?2:0}}>
              <span style={{fontFamily:F.t,fontSize:10,fontWeight:700,color:C.wh}}>{a.label}</span>
            </div>
            <div style={{padding:"5px 10px",fontSize:9,color:C.txt,lineHeight:1.35}}>{a.desc}</div>
            {i<2 && <div style={{textAlign:"center",color:C.pg,fontSize:11,lineHeight:1}}>▼</div>}
          </div>
        ))}
        <div style={{marginTop:10,textAlign:"center"}}>
          <p style={{fontSize:9,color:C.mgr,fontStyle:"italic",lineHeight:1.4,margin:0}}>
            "Isolated consideration of either CD or the RBV gives an incomplete picture of the firm."
            <br/><span style={{fontSize:7.5}}>— Chen, Michel & Lin, 2021</span>
          </p>
        </div>
      </div>
    </div>
  </Frame>
);

// ─── Article helpers ───
const ArticlePH = ({title,num,source,bucket,bucketColor,method,cc,findingsHeader,findings,gap,quote,application,placeholder}) => (
  <Frame title={title} num={num} source={source}>
    <Tags bucket={bucket} bucketColor={bucketColor} method={method}/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1.3}}>
        <SH color={bucketColor}>CORE CONTRIBUTION</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:"0 0 4px"}}>{cc}</p>
        <SH color={bucketColor}>{findingsHeader||"KEY INSIGHTS"}</SH>
        <Bullets size={9.5} items={findings}/>
        <Gap text={gap} color={bucketColor}/>
        <Quote text={quote} color={bucketColor}/>
        <SH color={bucketColor}>APPLICATION TO THESIS</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:0}}>{application}</p>
      </div>
      <div style={{flex:0.7}}>
        <Placeholder text={placeholder} style={{height:200}}/>
      </div>
    </div>
  </Frame>
);

const Article2C = ({title,num,source,bucket,bucketColor,method,cc,findingsHeader,findings,gap,quote,application}) => (
  <Frame title={title} num={num} source={source}>
    <Tags bucket={bucket} bucketColor={bucketColor} method={method}/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1}}>
        <SH color={bucketColor}>CORE CONTRIBUTION</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:"0 0 4px"}}>{cc}</p>
        <SH color={bucketColor}>{findingsHeader||"KEY INSIGHTS"}</SH>
        <Bullets size={9.5} items={findings}/>
        <Quote text={quote} color={bucketColor}/>
      </div>
      <div style={{flex:1}}>
        <Gap text={gap} color={bucketColor}/>
        <SH color={bucketColor}>APPLICATION TO THESIS</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:0}}>{application}</p>
      </div>
    </div>
  </Frame>
);

// ─── Slides 9-16 ───
const S9 = () => <ArticlePH title="Awareness, motivation, and capability drive competitive behavior — and define what CI must capture" num={9} bucket="COMPETITOR ANALYSIS & DYNAMICS" bucketColor={C.navy} method="THEORETICAL FRAMEWORK" source="Source: Chen, M.-J. (1996). Competitor Analysis and Interfirm Rivalry. Academy of Management Review, 21(1), 100–134" cc="Integrates competitor analysis (market commonality + resource similarity) with interfirm rivalry through three behavioral drivers: awareness, motivation, and capability (AMC). First attempt to bridge the prebattle competitive relationship with the prediction of rivalrous behavior." findings={["Market commonality and resource similarity shape competitive tension — behavior depends on whether managers are aware, motivated, and capable of responding","Competition is a multi-level phenomenon: global (firm level) and focal (specific market where a battle plays out)","Competitive asymmetry: a given pair of firms may not pose an equal degree of threat to each other"]} gap="Framework is static — how AMC drivers evolve dynamically as competitive interactions unfold remains unexplored." quote={'"The joint consideration of market commonality and resource similarity shows the complementarity of two prominent but contrasting strategy theories."'} application="AMC drivers map to what AI-driven CI must capture: awareness (what the system surfaces), motivation (strategic context), capability (resources to act). Lens for survey/interview design." placeholder={"Figure 2: Market commonality ×\nresource similarity → AMC\nbehavioral drivers → action outcomes"}/>;

const S10 = () => <ArticlePH title="How firms learn to identify competitors remains an open question — a direct fit for our research" num={10} bucket="COMPETITOR ANALYSIS & DYNAMICS" bucketColor={C.navy} method="SYSTEMATIC LIT REVIEW" source="Source: Gur, F.A. & Greckhamer, T. (2019). Know Thy Enemy. Journal of Management, 45(5), 2072–2100" cc="Organizes competitor identification into four perspectives (industry, strategic groups, manager-oriented, customer-oriented). Proposes six future research themes." findingsHeader="KEY FUTURE RESEARCH QUESTIONS (from 6 themes)" findings={["Theme 4 — How do firms learn to identify competitors? What routines do they develop?","Theme 1 — How do managers' cognitive maps of competitors change as environments change?","Theme 3 — How do individual managerial attributes affect who gets identified as a competitor?","Theme 5 — How do MNCs distribute competitor identification between HQ and subsidiaries?"]} gap='The role of managers\' competitive blind spots and how technology-driven shifts reshape competitive boundaries are both underexplored.' quote={'"How do firms learn to identify their competitors, and what kinds of routines do they develop for this purpose?"'} application='The "how firms learn" question is our research territory — with AI as the mechanism.' placeholder={"Figure: Four perspectives on\ncompetitor identification"}/>;

const S11 = () => <Article2C title="Competitor acumen — how accurately you read rivals' priorities — predicts market share gains" num={11} bucket="COMPETITOR ANALYSIS & DYNAMICS" bucketColor={C.navy} method="EMPIRICAL — QUANTITATIVE" source="Source: Tsai, W.; Su, K.-H. & Chen, M.-J. (2011). Seeing Through the Eyes of a Rival. AMJ, 54(4), 761–778" cc="Introduces competitor acumen: the extent to which a focal firm's assessment of a rival's prioritization of competitors reflects the rival's own view." findings={["A firm's prioritization reflects underlying strategic thinking with direct implications for resource allocation","Competitor acumen shaped by relational and structural competitive embeddedness","Firms with high competitor acumen + high resource deployment achieve greatest market share gains","\"Competitor acumen is even more important in today's dynamic, intensely competitive environment\""]} gap='Single point in time, U.S. airlines only. Authors call for "longitudinal database" and "dynamic model of competitor acumen."' quote={'"Competitor acumen: the extent to which a focal firm\'s assessment of a given rival\'s prioritization of competitors reflects the rival\'s own view."'} application="Measurable construct for interviews/surveys. AI-driven CI should increase competitor acumen — a potential DV or mediating construct."/>;

const S12 = () => <ArticlePH title="The CA function's core tension: too much time on data, not enough on analysis that drives action" num={12} bucket="CI PROCESS & ORGANIZATION" bucketColor={C.blue} method="SURVEY + CASE STUDY (3 MNCs)" source="Source: Ghoshal, S. & Westney, D.E. (1991). Organizing Competitor Analysis Systems. SMJ, 12(1), 17–31" cc="First detailed empirical study of how firms organize the CA function. Identifies impediments across three clusters: data management, analysis, and implication." findings={["CA as change agent — top management supported it to make the corporation more responsive","Six uses of CI: sensitization, benchmarking, legitimation, inspiration, planning, decision-making","Analysts frustrated spending most time on data management; clients concerned about relevance to action","\"Managers need numbers they can move the organization with\""]} gap="Distrust of CA methodologies goes beyond time misallocation. How should the function be reorganized when technology automates data management?" quote={'"A system that would reduce the amount of time expended on data management would free up time for the analysis which is increasingly the focus of client demands."'} application="Foundational for CI/CA organization. AI addresses the data management bottleneck." placeholder={"Table 1: Impediments by clients\n(n=63) and analysts (n=73)"}/>;

const S13 = () => <ArticlePH title="Comprehensive CI systems fail at the point of action — project-based CA closes the gap" num={13} bucket="CI PROCESS & ORGANIZATION" bucketColor={C.blue} method="FIELD RESEARCH (16 PROJECTS)" source="Source: Prescott, J.E. & Smith, D.C. (1987). A Project-Based Approach to Competitive Analysis. SMJ, 8(5), 411–423" cc="Bridges comprehensive CI and informal procedures. Project-based framework across 15 dimensions focuses on specific decision requirements." findings={["Project-based CA produces highly relevant competitive information for immediate decisions","Framework: project definition → constraints → analysis tasks → recommendations (closed-loop)","Key distinction across 15 dimensions: comprehensive = general, ongoing; project-based = specific, time-bound"]} gap="Can technology bridge the comprehensive–project divide?" quote={'"The framework is driven by the competitive intelligence requirements of a specific project rather than the broad strategic thrust of the business."'} application="AI-driven CI could bridge both: always-on monitoring plus project-triggered deep dives." placeholder={"Figure 1: Project definition →\nconstraints → analysis tasks →\nrecommendations"}/>;

const S14 = () => <Article2C title="Strategy implementation is the neglected half — linking formulation to outcomes is the frontier" num={14} bucket="STRATEGY PROCESS" bucketColor={C.red} method="SYSTEMATIC LIT REVIEW (991)" source="Source: Hutzschenreuter, T. & Kleindienst, I. (2006). Strategy-Process Research. JOM, 32(5), 673–720" cc="Reviews 991 articles: antecedents → strategy process (formulation + implementation) → outcomes. Six perspectives identified." findings={["Implementation skills can be learned and are contingent on organizational environment dynamics","Success depends on strategic decision commitment, learning, and key-person involvement","Strategists' cognitive models (culture, age, expertise) are associated with outcomes","\"Implementing strategy means managing change. Change may lead to unease, hindering effectiveness\""]} gap='(1) "Link implementation characteristics to outcomes." (2) "Establish a link between formulation and implementation." No implementation taxonomies after 991 articles.' quote={'"Research on implementation is seen as inferior compared with formulation. This is incomprehensible because implementation is the most important challenge."'} application="Directly parallels our CIO framework (Capabilities → Implementation → Outcomes)."/>;

// S15: Mintzberg
const S15 = () => {
  const grad=[{n:"Planned",d:"Precise intentions, centrally controlled",c:"#003366"},{n:"Entrepreneurial",d:"One leader's vision",c:"#0D477A"},{n:"Ideological",d:"Collective vision, shared beliefs",c:"#1A5B8E"},{n:"Umbrella",d:"Leaders set boundaries, details emerge",c:"#4A6E8C"},{n:"Process",d:"Leaders control process, content emerges",c:"#7A5E6E"},{n:"Unconnected",d:"Subunits produce patterns independently",c:"#8C4A50"},{n:"Consensus",d:"Actors converge without central direction",c:"#9E3538"},{n:"Imposed",d:"Environment dictates action patterns",c:"#B22028"}];
  return(<Frame title="Strategy walks on two feet — deliberate and emergent — and AI may reshape the balance" num={15} source="Source: Mintzberg, H. & Waters, J.A. (1985). Of Strategies, Deliberate and Emergent. SMJ, 6(3), 257–272">
    <Tags bucket="STRATEGY PROCESS" bucketColor={C.red} method="FOUNDATIONAL THEORY"/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1.2}}>
        <SH color={C.red}>CORE CONTRIBUTION</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:"0 0 4px"}}>Distinguishes deliberate strategy (intended and realized) from emergent strategy (patterns without intention). Eight types along the continuum.</p>
        <SH color={C.red}>KEY INSIGHTS</SH>
        <Bullets size={9.5} items={['Emergent strategy = "strategic learning" — responding to evolving reality','Pattern recognition is crucial to effective managers','"Umbrella strategy" maps to AI-driven CI — leaders set boundaries, details emerge']}/>
        <Gap text="Strategies more deliberate in centrally controlled orgs; more emergent in decentralized ones — does AI centralize or decentralize this?" color={C.red}/>
        <Quote text='"Our conclusion is that strategy formation walks on two feet, one deliberate, the other emergent."' color={C.red}/>
        <SH color={C.red}>APPLICATION TO THESIS</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:0}}>AI excels at pattern recognition — does AI make emergent strategies more visible and deliberately manageable?</p>
      </div>
      <div style={{flex:0.8}}>
        <SH color={C.red}>EIGHT STRATEGY TYPES</SH>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 10px",marginBottom:6}}>
          {grad.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:5,padding:"2px 0"}}><div style={{width:4,height:26,background:s.c,flexShrink:0,borderRadius:1}}/><div><div style={{fontFamily:F.t,fontSize:8,fontWeight:700,color:s.c}}>{s.n}</div><div style={{fontSize:7,color:C.txt}}>{s.d}</div></div></div>))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:7,fontWeight:700,marginBottom:8}}><span style={{color:C.navy}}>← DELIBERATE</span><span style={{color:C.red}}>EMERGENT →</span></div>
        <Placeholder text={"Figure 1: Intended → Deliberate → Realized\nstrategy (with unrealized + emergent paths)"} style={{height:110}}/>
      </div>
    </div>
  </Frame>);
};

// S16: Chen 2021
const S16 = () => {
  const dirs=[{t:"Motivational Concerns",d:"Resource portfolios may motivate competitive behaviors beyond market overlap",c:C.navy},{t:"Nonmarket Strategy",d:"Social, political, legal arrangements structure interactions outside markets",c:C.blue},{t:"Factor Markets",d:"CD in upstream resources — contestants beyond \"the usual suspects\"",c:C.green},{t:"Time-Based Competition",d:"Juxtaposes CD temporary advantage with RBV durable advantage",c:C.red,h:true},{t:"Multilateral Interaction",d:"Competition increasingly group vs. group, platform vs. platform",c:C.purple}];
  return(<Frame title="Neither CD nor RBV addresses time-based competition for future markets — combining them could" num={16} source="Source: Chen, M.-J.; Michel, J.G. & Lin, W. (2021). Worlds Apart? JOM, 47(7), 1820–1840">
    <Tags bucket="CD + RBV INTEGRATION" bucketColor={C.mgr} method="INTEGRATIVE REVIEW"/>
    <div style={{display:"flex",gap:16}}>
      <div style={{flex:1.1}}>
        <SH color={C.mgr}>CORE CONTRIBUTION</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:"0 0 4px"}}>Bridges CD (external, transitory advantage) and RBV (internal, sustainable advantage). AMC is a natural bridge.</p>
        <SH color={C.mgr}>KEY INSIGHTS</SH>
        <Bullets size={9.5} items={["CEO temporal focus associated with competitive aggressiveness","CD has neglected factor markets — a blind spot for pharma","Both CD and RBV jointly illuminate future-oriented strategic positions"]}/>
        <Gap text='"Neither CD nor RBV has adequately embraced time-based actions that focus on building future competitiveness."' color={C.mgr}/>
        <Quote text='"The timing and urgency and the longevity of resource decisions are central to strategic management."' color={C.mgr}/>
        <SH color={C.mgr}>APPLICATION TO THESIS</SH>
        <p style={{fontSize:9.5,color:C.txt,lineHeight:1.4,margin:0}}>Combining capabilities (RBV/Verona) with competitive dynamics through CI. What capabilities must be built today?</p>
      </div>
      <div style={{flex:0.9}}>
        <SH color={C.mgr}>FIVE FUTURE RESEARCH DIRECTIONS</SH>
        {dirs.map((d,i)=>(<div key={i} style={{background:C.lbg,borderLeft:`${d.h?5:4}px solid ${d.c}`,padding:"6px 10px",marginBottom:5,display:"flex",gap:8,alignItems:"flex-start"}}><div style={{width:20,height:20,borderRadius:"50%",background:d.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.wh,flexShrink:0}}>{i+1}</div><div><div style={{fontFamily:F.t,fontSize:d.h?10:9.5,fontWeight:700,color:d.c}}>{d.t}{d.h&&" ★"}</div><div style={{fontSize:8.5,color:C.txt,lineHeight:1.3}}>{d.d}</div></div></div>))}
      </div>
    </div>
  </Frame>);
};

// ─── DECK NAV ───
const slides=[
  {comp:S2_RBV,label:"S2: RBV (Updated)"},{comp:S8_CD,label:"S8: CD Synthesis (New)"},
  {comp:S9,label:"S9: Chen 1996"},{comp:S10,label:"S10: Gur 2019"},{comp:S11,label:"S11: Tsai 2011"},
  {comp:S12,label:"S12: Ghoshal 1991"},{comp:S13,label:"S13: Prescott 1987"},
  {comp:S14,label:"S14: Hutzschenreuter"},{comp:S15,label:"S15: Mintzberg"},{comp:S16,label:"S16: Chen 2021"},
];

function App(){
  const [cur,setCur]=useState(0);
  const Slide=slides[cur].comp;
  return(
    <div style={{background:"#E8E8E8",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:16,gap:10}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button onClick={()=>setCur(Math.max(0,cur-1))} disabled={cur===0} style={{padding:"5px 14px",fontSize:12,cursor:cur===0?"default":"pointer",opacity:cur===0?0.4:1,border:"1px solid #D9D9D9",borderRadius:4,background:"white",color:"#767171"}}>← Prev</button>
        <span style={{fontSize:12,color:"#767171",minWidth:120,textAlign:"center"}}>Slide {cur+1} / {slides.length}</span>
        <button onClick={()=>setCur(Math.min(slides.length-1,cur+1))} disabled={cur>=slides.length-1} style={{padding:"5px 14px",fontSize:12,cursor:cur>=slides.length-1?"default":"pointer",opacity:cur>=slides.length-1?0.4:1,border:"1px solid #D9D9D9",borderRadius:4,background:"white",color:"#767171"}}>Next →</button>
      </div>
      <Slide/>
      <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"center",maxWidth:960}}>
        {slides.map((s,i)=>(<button key={i} onClick={()=>setCur(i)} style={{padding:"2px 6px",fontSize:8,border:`1px solid ${i===cur?"#B22028":"#D9D9D9"}`,borderRadius:3,background:i===cur?"#B22028":"white",color:i===cur?"white":"#767171",cursor:"pointer"}}>{s.label}</button>))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
